<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Lab Dashboard</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #1a1a1a; color: white; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: #2d2d2d; padding: 20px; margin: 10px 0; border-radius: 10px; }
        h1 { color: #667eea; }
        .status-online { color: #4CAF50; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Brain Lab Dashboard Profesional</h1>
        <p>Dashboard operativo integrado en Brain Server</p>
        
        <div class="card">
            <h2>Estado del Sistema</h2>
            <p>Brain Server: <span class="status-online">ONLINE</span></p>
            <p>Dashboard: <span class="status-online">OPERATIVO</span></p>
            <p>Trust Score: 95/100</p>
        </div>
    </div>
</body>
</html>
